<!DOCTYPE html>
<html>
<head>
    <title>Animated Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(270deg, #ff6a00, #ee0979, #00c6ff);
            background-size: 600% 600%;
            animation: bgAnimation 10s ease infinite;
            font-family: Arial;
        }

        @keyframes bgAnimation {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .calculator {
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
            animation: pop 0.6s ease;
        }

        @keyframes pop {
            from {transform: scale(0.7); opacity: 0;}
            to {transform: scale(1); opacity: 1;}
        }

        #display {
            width: 100%;
            height: 60px;
            border: none;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 26px;
            text-align: right;
            padding: 10px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 70px);
            gap: 10px;
        }

        button {
            height: 60px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 10px #fff;
        }

        button:active {
            transform: scale(0.9);
        }

        .num { background: rgba(255,255,255,0.2); color: white; }
        .op { background: rgba(255,165,0,0.8); color: white; }
        .equal { background: rgba(0,255,100,0.8); color: white; }
        .clear { background: rgba(255,0,0,0.7); color: white; }

        @media(max-width: 500px){
            .buttons { grid-template-columns: repeat(4, 60px); }
            button { height: 50px; }
        }
    </style>
</head>

<body>

<div class="calculator">
    <input type="text" id="display" readonly>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="op" onclick="append('/')">/</button>
        <button class="op" onclick="append('*')">*</button>
        <button class="op" onclick="append('-')">-</button>

        <button class="num" onclick="append('7')">7</button>
        <button class="num" onclick="append('8')">8</button>
        <button class="num" onclick="append('9')">9</button>
        <button class="op" onclick="append('+')">+</button>

        <button class="num" onclick="append('4')">4</button>
        <button class="num" onclick="append('5')">5</button>
        <button class="num" onclick="append('6')">6</button>
        <button class="equal" onclick="calculate()">=</button>

        <button class="num" onclick="append('1')">1</button>
        <button class="num" onclick="append('2')">2</button>
        <button class="num" onclick="append('3')">3</button>
        <button class="num" onclick="append('0')">0</button>
    </div>
</div>

<script>
    let display = document.getElementById("display");

    function append(val) {
        display.value += val;
    }

    function clearDisplay() {
        display.value = "";
    }

    function calculate() {
        try {
            display.value = eval(display.value);
        } catch {
            display.value = "Error";
        }
    }

    // Keyboard support
    document.addEventListener("keydown", function(e) {
        if (!isNaN(e.key) || "+-*/".includes(e.key)) append(e.key);
        else if (e.key === "Enter") calculate();
        else if (e.key === "Backspace") display.value = display.value.slice(0, -1);
        else if (e.key === "Escape") clearDisplay();
    });
</script>

</body>
</html>
